<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>400 — Запрос сломан</title>
  <link rel="stylesheet" href="/error-pages/assets/css/style.css">
</head>

<body data-error="400">
  <div class="noise"></div>
  <div class="scanline"></div>

  <button class="theme-toggle" type="button" id="theme-toggle" aria-label="Переключить тему">
    <span class="theme-toggle__text">dark</span>
  </button>

  <main class="page">
    <div class="brand" aria-label="egor_zvada">
      <div class="mark"><span>e</span></div>
      <div class="brand-name">egor_zvada</div>
    </div>

    <div class="boot" aria-hidden="true">
      <span class="boot-line">&gt; init service_request</span>
      <span class="boot-line">&gt; status: 400 bad request</span>
    </div>

    <section class="center" aria-label="Ошибка 400">
      <div class="error-label">BAD REQUEST</div>

      <div class="error-wrap">
        <h1 class="error">
          <span class="digit digit-1">4</span><span class="digit digit-2">0</span><span class="digit digit-3">0</span>
        </h1>
        <span class="cursor" aria-hidden="true"></span>
      </div>
    </section>

    <div class="bottom-text">
      <h2 class="title">Запрос сломан</h2>
      <p class="description">400 / Неверный запрос</p>
      <p class="text">Сервис не смог понять этот запрос. Проверьте адрес или отправленные данные.</p>
    </div>

    <footer class="footer-time">
      <div id="time">TIME --:--:--</div>
      <nav class="footer-actions" aria-label="Навигация страницы ошибки">
        <a href="/">На главную</a>
        <button type="button" data-go-back>Назад</button>
      </nav>
      <div class="footer-rights">Егор Звада™. Все права защищены.</div>
    </footer>
  </main>

  <script src="/error-pages/assets/js/app.js"></script>
</body>
</html>

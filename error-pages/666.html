<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>666 — cursed</title>

  <link rel="stylesheet" href="/error-pages/assets/css/style.css">

  <style>
    /*
      666 PAGE EFFECTS ONLY
      Здесь только доп-эффекты для 666:
      - красная виньетка
      - капли
      - глитч
      - покраснение ERROR / 666 / курсора
    */

    body[data-error="666"] {
      --blood-main: #a00000;
      --blood-mid: #640000;
      --blood-dark: #230000;
      --blood-glow: rgba(160, 0, 0, .42);
    }

    /*
      Логотип и кнопка темы поверх эффектов.
      Их не перекрывает виньетка/капли/глитч-слои.
    */
    body[data-error="666"] .brand,
    body[data-error="666"] .theme-toggle {
      z-index: 40;
    }

    body[data-error="666"] .page {
      z-index: 3;
      animation: pageGlitch 5200ms steps(1, end) 4300ms infinite;
    }

    /*
      Логотип слегка глючит, но transform сохраняет translateX(-50%),
      иначе он уедет с центра.
    */
    body[data-error="666"] .brand {
      animation:
        fadeInBrand 500ms ease-out 700ms forwards,
        brandGlitch 3900ms steps(1, end) 3900ms infinite;
    }

    /*
      Кнопка темы глючит отдельно.
      Она fixed справа, поэтому можно двигать transform.
    */
    body[data-error="666"] .theme-toggle {
      animation: smallGlitch 4300ms steps(1, end) 4700ms infinite;
    }

    /*
      Bootline глючит мягко.
    */
    body[data-error="666"] .boot {
      animation: bootGlitch 3200ms steps(1, end) 3600ms infinite;
    }

    body[data-error="666"] .boot-line {
      text-shadow:
        0 0 8px rgba(150, 0, 0, .24),
        0 0 16px rgba(90, 0, 0, .18);
    }

    /*
      Нижний текст глючит, но transform сохраняет translateX(-50%),
      иначе блок уедет.
    */
    body[data-error="666"] .bottom-text {
      animation:
        fadeInBottom 700ms ease-out 2200ms forwards,
        bottomTextGlitch 4200ms steps(1, end) 4300ms infinite;
    }

    /*
      TIME НЕ ДЁРГАЕМ через transform.
      Только лёгкое мерцание через opacity/filter, чтобы он не съезжал.
    */
    body[data-error="666"] .footer-time {
      animation:
        fadeInBottom 700ms ease-out 2450ms forwards,
        footerFlicker 4200ms steps(1, end) 4300ms infinite;
    }

    /*
      666 сначала белый из общего CSS,
      потом становится красным и глючит.
    */
    body[data-error="666"] .error {
      color: var(--text-main);
      text-shadow: none;
      animation:
        errorTurnsRed 900ms ease-out 3300ms forwards,
        codeGlitch 2200ms steps(1, end) 3900ms infinite;
    }

    body[data-error="666"] .error::before,
    body[data-error="666"] .error::after {
      content: "666";
      position: absolute;
      inset: 0;
      display: inline-flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      font: inherit;
      letter-spacing: inherit;
      line-height: inherit;
      white-space: nowrap;
    }

    body[data-error="666"] .error::before {
      color: rgba(255, 0, 0, .68);
      transform: translateX(-10px);
      clip-path: inset(0 0 52% 0);
      animation: codeGlitchBefore 2200ms steps(1, end) 3900ms infinite;
    }

    body[data-error="666"] .error::after {
      color: rgba(255, 255, 255, .48);
      transform: translateX(10px);
      clip-path: inset(50% 0 0 0);
      animation: codeGlitchAfter 2200ms steps(1, end) 3900ms infinite;
    }

    /*
      Курсор становится красным и глючит.
    */
    body[data-error="666"] .cursor {
      animation:
        showCursor 1ms linear 1900ms forwards,
        blink 900ms steps(1, end) 2000ms infinite,
        cursorTurnsRed 900ms ease-out 3300ms forwards,
        cursorGlitch 2600ms steps(1, end) 4200ms infinite;
    }

    /*
      ERROR сначала обычный,
      потом краснеет и глючит.
    */
    body[data-error="666"] .error-label {
      color: var(--text-main);
      border-color: var(--line-main);
      box-shadow:
        0 0 18px rgba(120, 0, 0, .10),
        inset 0 0 14px rgba(120, 0, 0, .08);
      animation:
        fadeIn 450ms ease-out 1450ms forwards,
        labelTurnsRed 900ms ease-out 3300ms forwards,
        labelBloodGlow 1400ms ease-in-out 3500ms infinite,
        labelGlitch 1900ms steps(1, end) 3800ms infinite;
    }

    body[data-error="666"] .error-label::before,
    body[data-error="666"] .error-label::after {
      content: "ERROR";
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      padding: inherit;
      font: inherit;
      letter-spacing: inherit;
      line-height: inherit;
      text-transform: inherit;
    }

    body[data-error="666"] .error-label::before {
      color: rgba(255, 0, 0, .82);
      transform: translateX(-4px);
      clip-path: inset(0 0 55% 0);
      animation: labelGhostBefore 1900ms steps(1, end) 3800ms infinite;
    }

    body[data-error="666"] .error-label::after {
      color: rgba(255, 255, 255, .66);
      transform: translateX(4px);
      clip-path: inset(50% 0 0 0);
      animation: labelGhostAfter 1900ms steps(1, end) 3800ms infinite;
    }

    /*
      Заголовок и описание тоже глючат.
    */
    body[data-error="666"] .title {
      animation:
        titleBloodGlow 900ms ease-out 3500ms forwards,
        titleGlitch 4500ms steps(1, end) 4600ms infinite;
    }

    body[data-error="666"] .description {
      position: relative;
      animation: descriptionGlitch 2700ms steps(1, end) 4100ms infinite;
    }

    body[data-error="666"] .description::before,
    body[data-error="666"] .description::after {
      content: "666 / Cursed Request";
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      color: currentColor;
      font: inherit;
      letter-spacing: inherit;
      line-height: inherit;
      text-align: center;
    }

    body[data-error="666"] .description::before {
      transform: translateX(-3px);
      clip-path: inset(0 0 50% 0);
      animation: descriptionGhostBefore 2700ms steps(1, end) 4100ms infinite;
    }

    body[data-error="666"] .description::after {
      transform: translateX(3px);
      clip-path: inset(48% 0 0 0);
      animation: descriptionGhostAfter 2700ms steps(1, end) 4100ms infinite;
    }

    body[data-error="666"] .text {
      animation: textGlitch 5200ms steps(1, end) 5000ms infinite;
    }

    /*
      Красная виньетка.
    */
    .blood-vignette {
      position: fixed;
      inset: 0;
      z-index: 7;
      pointer-events: none;
      opacity: 0;
      background:
        radial-gradient(circle at center,
          rgba(0, 0, 0, 0) 0%,
          rgba(0, 0, 0, 0) 34%,
          rgba(80, 0, 0, .10) 58%,
          rgba(120, 0, 0, .28) 78%,
          rgba(80, 0, 0, .46) 100%
        ),
        radial-gradient(circle at 15% 20%, rgba(140, 0, 0, .18), transparent 32%),
        radial-gradient(circle at 85% 28%, rgba(120, 0, 0, .14), transparent 34%),
        radial-gradient(circle at 50% 92%, rgba(150, 0, 0, .16), transparent 38%);
      animation: vignetteIn 1200ms ease-out 3100ms forwards;
    }

    .blood-vignette::after {
      content: "";
      position: absolute;
      inset: -8%;
      opacity: .38;
      background:
        radial-gradient(circle at 50% 50%, transparent 42%, rgba(150, 0, 0, .28) 100%);
      animation: vignettePulse 2200ms ease-in-out 4100ms infinite;
    }

    /*
      Мягкая красная дымка.
    */
    .blood-haze {
      position: fixed;
      inset: 0;
      z-index: 6;
      pointer-events: none;
      opacity: 0;
      background:
        radial-gradient(circle at 50% 22%, rgba(120,0,0,.12), transparent 36%),
        radial-gradient(circle at 28% 68%, rgba(90,0,0,.10), transparent 32%),
        radial-gradient(circle at 76% 64%, rgba(120,0,0,.09), transparent 34%);
      animation: hazeIn 1400ms ease-out 3400ms forwards;
    }

    /*
      Капающая кровь.
      Без луж, без верхних овалов, только падающие капли.
    */
    .blood-rain {
      position: fixed;
      inset: 0;
      z-index: 8;
      pointer-events: none;
      overflow: hidden;
      opacity: 0;
      animation: rainLayerIn 600ms ease-out 3300ms forwards;
    }

    .blood-drop {
      position: absolute;
      top: -40px;
      left: var(--x);
      width: var(--s);
      height: calc(var(--s) * 1.45);
      border-radius: 58% 58% 64% 64%;
      opacity: 0;
      background:
        radial-gradient(circle at 35% 24%, rgba(255,255,255,.20) 0 2px, transparent 3px),
        radial-gradient(circle at 50% 45%, var(--blood-main) 0%, var(--blood-mid) 54%, var(--blood-dark) 100%);
      box-shadow:
        0 0 12px rgba(150, 0, 0, .32),
        inset -2px -3px 5px rgba(0, 0, 0, .34);
      transform: translateY(0) scale(.9);
      animation: dropFall var(--t) cubic-bezier(.22,.62,.38,1) var(--d) forwards;
    }

    .blood-drop.long {
      height: calc(var(--s) * 3.2);
      border-radius: 999px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.13), transparent 18%),
        linear-gradient(180deg, var(--blood-main) 0%, var(--blood-mid) 46%, var(--blood-dark) 100%);
      filter: blur(.1px);
    }

    .blood-drop.dim {
      opacity: 0;
      filter: brightness(.72);
    }

    /*
      Общий слой экранного сбоя.
    */
    .curse-glitch-layer {
      position: fixed;
      inset: 0;
      z-index: 12;
      pointer-events: none;
      opacity: 0;
      background:
        linear-gradient(
          to bottom,
          transparent 0%,
          transparent 15%,
          rgba(255, 0, 0, .16) 15.4%,
          transparent 17%,
          transparent 42%,
          rgba(255, 255, 255, .09) 43%,
          transparent 44.2%,
          transparent 71%,
          rgba(255, 0, 0, .12) 72%,
          transparent 73.5%,
          transparent 100%
        );
      mix-blend-mode: screen;
      animation: screenGlitch 3600ms steps(1, end) 4100ms infinite;
    }

    @keyframes vignetteIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes vignettePulse {
      0%, 100% {
        opacity: .34;
        transform: scale(1);
      }

      50% {
        opacity: .62;
        transform: scale(1.035);
      }
    }

    @keyframes hazeIn {
      to { opacity: 1; }
    }

    @keyframes rainLayerIn {
      to { opacity: 1; }
    }

    @keyframes dropFall {
      0% {
        opacity: 0;
        transform: translateY(0) scale(.82);
      }

      8% {
        opacity: .88;
      }

      82% {
        opacity: .76;
      }

      100% {
        opacity: 0;
        transform: translateY(112vh) scale(1.04);
      }
    }

    @keyframes errorTurnsRed {
      to {
        color: #a30000;
        text-shadow:
          0 0 10px rgba(150, 0, 0, .46),
          0 0 30px rgba(120, 0, 0, .30),
          0 0 70px rgba(80, 0, 0, .22);
      }
    }

    @keyframes cursorTurnsRed {
      to {
        background: #9b0000;
        box-shadow:
          0 0 12px rgba(160, 0, 0, .42),
          0 0 34px rgba(100, 0, 0, .28);
      }
    }

    @keyframes labelTurnsRed {
      to {
        color: #b00000;
        border-color: #9b0000;
        text-shadow:
          0 0 10px rgba(150, 0, 0, .46),
          0 0 24px rgba(120, 0, 0, .28);
        box-shadow:
          0 0 20px rgba(150, 0, 0, .34),
          inset 0 0 18px rgba(120, 0, 0, .18);
      }
    }

    @keyframes labelBloodGlow {
      0%, 100% {
        box-shadow:
          0 0 16px rgba(120, 0, 0, .14),
          inset 0 0 12px rgba(120, 0, 0, .08);
      }

      50% {
        box-shadow:
          0 0 30px rgba(180, 0, 0, .34),
          inset 0 0 22px rgba(150, 0, 0, .18);
      }
    }

    @keyframes labelGlitch {
      0%, 82%, 100% {
        transform: none;
        filter: none;
      }

      83% {
        transform: translateX(-3px);
        filter: contrast(1.55) brightness(1.14);
      }

      84% {
        transform: translateX(5px);
      }

      85% {
        transform: translateX(-2px);
      }

      86% {
        transform: none;
        filter: none;
      }

      94% {
        transform: translateY(-2px);
      }

      95% {
        transform: translateY(2px);
      }

      96% {
        transform: none;
      }
    }

    @keyframes labelGhostBefore {
      0%, 80%, 100% {
        opacity: 0;
        transform: translateX(-3px);
      }

      81% {
        opacity: .78;
        transform: translateX(-7px);
      }

      82% {
        opacity: 0;
      }

      91% {
        opacity: .58;
        transform: translateX(-5px);
      }

      92% {
        opacity: 0;
      }
    }

    @keyframes labelGhostAfter {
      0%, 80%, 100% {
        opacity: 0;
        transform: translateX(3px);
      }

      81% {
        opacity: .62;
        transform: translateX(7px);
      }

      82% {
        opacity: 0;
      }

      91% {
        opacity: .46;
        transform: translateX(5px);
      }

      92% {
        opacity: 0;
      }
    }

    @keyframes codeGlitch {
      0%, 78%, 100% {
        transform: none;
        filter: none;
      }

      79% {
        transform: translateX(-7px) skewX(-2deg);
        filter: contrast(1.6) brightness(1.12);
      }

      80% {
        transform: translateX(9px) skewX(2deg);
      }

      81% {
        transform: translateX(-4px);
      }

      82% {
        transform: none;
        filter: none;
      }

      92% {
        transform: translateY(-4px);
      }

      93% {
        transform: translateY(3px);
      }

      94% {
        transform: none;
      }
    }

    @keyframes codeGlitchBefore {
      0%, 76%, 100% {
        opacity: 0;
        transform: translateX(-8px);
      }

      77% {
        opacity: .58;
        transform: translateX(-16px);
      }

      78% {
        opacity: 0;
      }

      88% {
        opacity: .42;
        transform: translateX(-12px);
      }

      89% {
        opacity: 0;
      }
    }

    @keyframes codeGlitchAfter {
      0%, 76%, 100% {
        opacity: 0;
        transform: translateX(8px);
      }

      77% {
        opacity: .48;
        transform: translateX(16px);
      }

      78% {
        opacity: 0;
      }

      88% {
        opacity: .34;
        transform: translateX(12px);
      }

      89% {
        opacity: 0;
      }
    }

    @keyframes descriptionGlitch {
      0%, 86%, 100% {
        transform: none;
        filter: none;
      }

      87% {
        transform: translateX(-3px);
        filter: contrast(1.35);
      }

      88% {
        transform: translateX(4px);
      }

      89% {
        transform: none;
        filter: none;
      }

      95% {
        transform: translateX(2px);
      }

      96% {
        transform: none;
      }
    }

    @keyframes descriptionGhostBefore {
      0%, 84%, 100% {
        opacity: 0;
        transform: translateX(-3px);
      }

      85% {
        opacity: .46;
        transform: translateX(-6px);
      }

      86% {
        opacity: 0;
      }

      93% {
        opacity: .32;
        transform: translateX(-5px);
      }

      94% {
        opacity: 0;
      }
    }

    @keyframes descriptionGhostAfter {
      0%, 84%, 100% {
        opacity: 0;
        transform: translateX(3px);
      }

      85% {
        opacity: .40;
        transform: translateX(6px);
      }

      86% {
        opacity: 0;
      }

      93% {
        opacity: .28;
        transform: translateX(5px);
      }

      94% {
        opacity: 0;
      }
    }

    @keyframes titleBloodGlow {
      to {
        text-shadow: 0 0 16px rgba(120, 0, 0, .24);
      }
    }

    @keyframes brandGlitch {
      0%, 84%, 100% {
        filter: none;
        transform: translateX(-50%);
      }

      85% {
        filter: drop-shadow(-4px 0 rgba(160, 0, 0, .72));
        transform: translateX(calc(-50% - 2px));
      }

      86% {
        filter: drop-shadow(4px 0 rgba(255, 255, 255, .32));
        transform: translateX(calc(-50% + 2px));
      }

      87% {
        filter: none;
        transform: translateX(-50%);
      }
    }

    @keyframes smallGlitch {
      0%, 86%, 100% {
        transform: none;
        filter: none;
      }

      87% {
        transform: translateX(-3px);
        filter: contrast(1.35);
      }

      88% {
        transform: translateX(3px);
      }

      89% {
        transform: none;
        filter: none;
      }
    }

    @keyframes bootGlitch {
      0%, 82%, 100% {
        transform: none;
        opacity: 1;
      }

      83% {
        transform: translateX(5px);
        opacity: .48;
      }

      84% {
        transform: translateX(-3px);
        opacity: .95;
      }

      85% {
        transform: none;
        opacity: 1;
      }

      93% {
        opacity: .34;
        filter: contrast(1.5);
      }

      94% {
        opacity: 1;
        filter: none;
      }
    }

    @keyframes bottomTextGlitch {
      0%, 84%, 100% {
        filter: none;
        transform: translateX(-50%);
      }

      85% {
        filter: contrast(1.55) drop-shadow(-4px 0 rgba(160, 0, 0, .32));
        transform: translateX(calc(-50% - 3px));
      }

      86% {
        filter: drop-shadow(4px 0 rgba(255, 255, 255, .18));
        transform: translateX(calc(-50% + 3px));
      }

      87% {
        filter: none;
        transform: translateX(-50%);
      }
    }

    @keyframes titleGlitch {
      0%, 86%, 100% {
        transform: none;
      }

      87% {
        transform: translateX(-4px);
      }

      88% {
        transform: translateX(3px);
      }

      89% {
        transform: none;
      }
    }

    @keyframes textGlitch {
      0%, 88%, 100% {
        opacity: 1;
        transform: none;
      }

      89% {
        opacity: .44;
        transform: translateX(3px);
      }

      90% {
        opacity: 1;
        transform: translateX(-2px);
      }

      91% {
        transform: none;
      }
    }

    @keyframes footerFlicker {
      0%, 86%, 100% {
        opacity: 1;
        filter: none;
      }

      87% {
        opacity: .45;
        filter: contrast(1.4);
      }

      88% {
        opacity: 1;
      }

      94% {
        opacity: .62;
      }

      95% {
        opacity: 1;
      }
    }

    @keyframes cursorGlitch {
      0%, 78%, 100% {
        transform: none;
      }

      79% {
        transform: translateX(12px) scaleX(1.25);
      }

      80% {
        transform: translateX(-5px) scaleX(.8);
      }

      81% {
        transform: none;
      }
    }

    @keyframes screenGlitch {
      0%, 80%, 100% {
        opacity: 0;
        transform: translateY(0);
      }

      81% {
        opacity: .78;
        transform: translateY(-3px);
      }

      82% {
        opacity: 0;
      }

      91% {
        opacity: .52;
        transform: translateY(5px);
      }

      92% {
        opacity: 0;
      }
    }

    @keyframes pageGlitch {
      0%, 88%, 100% {
        filter: none;
      }

      89% {
        filter: contrast(1.08);
      }

      90% {
        filter: none;
      }
    }

    @media (max-width: 700px) {
      .blood-drop {
        width: calc(var(--s) * .78);
        height: calc(var(--s) * 1.25);
      }

      .blood-drop.long {
        height: calc(var(--s) * 2.5);
      }

      .blood-vignette {
        background:
          radial-gradient(circle at center,
            rgba(0, 0, 0, 0) 0%,
            rgba(0, 0, 0, 0) 30%,
            rgba(80, 0, 0, .12) 56%,
            rgba(120, 0, 0, .30) 78%,
            rgba(80, 0, 0, .50) 100%
          ),
          radial-gradient(circle at 12% 18%, rgba(140, 0, 0, .16), transparent 34%),
          radial-gradient(circle at 88% 28%, rgba(120, 0, 0, .14), transparent 36%),
          radial-gradient(circle at 50% 92%, rgba(150, 0, 0, .15), transparent 40%);
      }
    }
  </style>
</head>

<body data-error="666">
  <div class="noise"></div>
  <div class="scanline"></div>
  <div class="curse-glitch-layer" aria-hidden="true"></div>

  <div class="blood-haze" aria-hidden="true"></div>
  <div class="blood-vignette" aria-hidden="true"></div>

  <div class="blood-rain" aria-hidden="true">
    <div class="blood-drop" style="--x: 7%; --s: 9px; --d: 3500ms; --t: 2200ms;"></div>
    <div class="blood-drop long" style="--x: 14%; --s: 7px; --d: 4050ms; --t: 1900ms;"></div>
    <div class="blood-drop dim" style="--x: 22%; --s: 6px; --d: 4700ms; --t: 2400ms;"></div>
    <div class="blood-drop" style="--x: 31%; --s: 11px; --d: 4300ms; --t: 2600ms;"></div>
    <div class="blood-drop long dim" style="--x: 39%; --s: 8px; --d: 5200ms; --t: 2100ms;"></div>
    <div class="blood-drop" style="--x: 48%; --s: 8px; --d: 3800ms; --t: 2300ms;"></div>
    <div class="blood-drop dim" style="--x: 57%; --s: 6px; --d: 5600ms; --t: 2500ms;"></div>
    <div class="blood-drop long" style="--x: 66%; --s: 7px; --d: 4500ms; --t: 2000ms;"></div>
    <div class="blood-drop" style="--x: 75%; --s: 10px; --d: 5000ms; --t: 2600ms;"></div>
    <div class="blood-drop dim" style="--x: 84%; --s: 6px; --d: 3900ms; --t: 2200ms;"></div>
    <div class="blood-drop long" style="--x: 93%; --s: 8px; --d: 5350ms; --t: 2100ms;"></div>
  </div>

  <button class="theme-toggle" type="button" id="theme-toggle" aria-label="Переключить тему">
